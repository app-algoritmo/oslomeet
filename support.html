        :root { --dark-bg: #0f172a; --card-bg: #1e293b; --text-primary: #f8fafc; --text-secondary: #94a3b8; --border-color: #334155; --accent-blue: #3b82f6; --accent-purple: #8b5cf6; --success-green: #10b981; }

        .language-selector { position: fixed; top: 12px; right: 12px; z-index: 1000; background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); border-radius: 50px; padding: 6px 12px; display: flex; align-items: center; gap: 8px; }

        .section-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.8rem; background: linear-gradient(135deg, #fff, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .section-subtitle { color: var(--text-secondary); font-size: 0.95rem; }
        .faq-list { max-width: 800px; margin: 0 auto; }

        .faq-question i { transition: transform 0.3s; font-size: 0.9rem; color: var(--accent-purple); }
