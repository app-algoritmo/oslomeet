<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Oslo Meet</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        
        <!-- Logo / Título -->
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-900">Oslo Meet Login</h1>

        <!-- Tabs -->
        <div class="flex mb-4 border-b">
            <button id="tabLogin" class="flex-1 py-2 text-blue-600 border-b-2 border-blue-600 font-medium">Entrar</button>
            <button id="tabSignup" class="flex-1 py-2 text-gray-500 hover:text-blue-600">Cadastrar</button>
        </div>

        <!-- Formulário -->
        <form id="authForm" class="space-y-4">
            <div id="nameField" class="hidden">
                <label class="block text-sm font-medium text-gray-700">Nome Completo</label>
                <input type="text" id="nameInput" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="emailInput" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Senha</label>
                <input type="password" id="passwordInput" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 p-2 border">
            </div>

            <p id="errorMessage" class="text-red-500 text-sm hidden"></p>

            <button type="submit" id="submitBtn" class="w-full bg-blue-900 text-white p-2 rounded-md hover:bg-blue-800 transition">
                Entrar na Plataforma
            </button>
        </form>

        <!-- Botão Voltar para Home -->
        <div class="mt-4 text-center">
            <a href="index.html" class="inline-flex items-center gap-2 text-sm text-gray-500 hover:text-blue-700 transition">
                ← Back to Home
            </a>
        </div>

    </div>

    <script type="module">
        import { signIn, signUp } from './auth.js'

        const form = document.getElementById('authForm')
        const tabLogin = document.getElementById('tabLogin')
        const tabSignup = document.getElementById('tabSignup')
        const nameField = document.getElementById('nameField')
        const submitBtn = document.getElementById('submitBtn')
        const errorMsg = document.getElementById('errorMessage')
        
        let isLoginMode = true

        tabLogin.addEventListener('click', () => {
            isLoginMode = true
            tabLogin.className = "flex-1 py-2 text-blue-600 border-b-2 border-blue-600 font-medium"
            tabSignup.className = "flex-1 py-2 text-gray-500 hover:text-blue-600"
            nameField.classList.add('hidden')
            submitBtn.textContent = "Entrar na Plataforma"
        })

        tabSignup.addEventListener('click', () => {
            isLoginMode = false
            tabSignup.className = "flex-1 py-2 text-blue-600 border-b-2 border-blue-600 font-medium"
            tabLogin.className = "flex-1 py-2 text-gray-500 hover:text-blue-600"
            nameField.classList.remove('hidden')
            submitBtn.textContent = "Criar Conta Grátis"
        })

        form.addEventListener('submit', async (e) => {
            e.preventDefault()
            errorMsg.classList.add('hidden')
            const email = document.getElementById('emailInput').value
            const password = document.getElementById('passwordInput').value
            const name = document.getElementById('nameInput').value

            submitBtn.disabled = true
            submitBtn.textContent = "Processando..."

            let result
            if (isLoginMode) {
                result = await signIn(email, password)
            } else {
                result = await signUp(email, password, name)
            }

            if (result.error) {
                errorMsg.textContent = result.error.message
                errorMsg.classList.remove('hidden')
                submitBtn.disabled = false
                submitBtn.textContent = isLoginMode ? "Entrar na Plataforma" : "Criar Conta Grátis"
            } else {
                if (!isLoginMode) {
                    alert("Conta criada! Verifique seu email (ou faça login se a confirmação estiver desativada).")
                }
                window.location.href = 'dashboard.html'
            }
        })
    </script>
</body>
</html>
