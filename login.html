<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Oslo Meet</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 420px;
        }
        .login-card h1 {
            text-align: center;
            color: #1e40af;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }
        .tabs {
            display: flex;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 1.5rem;
        }
        .tab {
            flex: 1;
            padding: 0.8rem;
            text-align: center;
            cursor: pointer;
            border: none;
            background: none;
            color: #64748b;
            font-weight: 500;
        }
        .tab.active {
            color: #2563eb;
            border-bottom: 2px solid #2563eb;
        }
        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #334155;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            background: #1e40af;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: #1e3a8a; }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-msg {
            color: #dc2626;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
            text-align: center;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { color: #2563eb; }
    </style>
    <!-- ✅ Supabase via CDN (SEM MODULE) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
    <div class="login-card">
        <h1>Oslo Meet Login</h1>
        <div class="tabs">
            <button class="tab active" id="tabLogin" onclick="switchTab('login')">Entrar</button>
            <button class="tab" id="tabSignup" onclick="switchTab('signup')">Cadastrar</button>
        </div>
        <form id="authForm">
            <div class="form-group" id="nameGroup" style="display:none;">
                <label>Nome Completo</label>
                <input type="text" id="nameInput" placeholder="Seu nome">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="emailInput" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="passwordInput" required placeholder="••••••••">
            </div>
            <p class="error-msg" id="errorMsg"></p>
            <button type="submit" class="btn-submit" id="submitBtn">Entrar na Plataforma</button>
        </form>
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        // ✅ Inicializar Supabase via CDN
        const SUPABASE_URL = 'https://mrparduxlvvflasgefpt.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ycGFyZHV4bHZ5Zmxhc2dlZnB0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MzE4NDUsImV4cCI6MjA5NTEwNzg0NX0.JXlq6E4t2iD_tvtlXhwVtE_oQBsgPP3QrIPi2UULji0';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let isLogin = true;

        // Alternar abas
        function switchTab(mode) {
            isLogin = mode === 'login';
            document.getElementById('tabLogin').className = isLogin ? 'tab active' : 'tab';
            document.getElementById('tabSignup').className = !isLogin ? 'tab active' : 'tab';
            document.getElementById('nameGroup').style.display = isLogin ? 'none' : 'block';
            document.getElementById('submitBtn').textContent = isLogin ? 'Entrar na Plataforma' : 'Criar Conta';
            document.getElementById('errorMsg').style.display = 'none';
        }

        // ✅ SUBMIT DO FORMULÁRIO (PREVINIR RELOAD)
        document.getElementById('authForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // ✅ Isso impede o reload da página!
            
            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            
            btn.disabled = true;
            btn.textContent = 'Processando...';
            errorMsg.style.display = 'none';

            try {
                let result;
                if (isLogin) {
                    // Login
                    result = await supabase.auth.signInWithPassword({ email, password });
                } else {
                    // Cadastro
                    const name = document.getElementById('nameInput').value;
                    result = await supabase.auth.signUp({ 
                        email, 
                        password,
                        options: { data: { full_name: name } }
                    });
                }

                if (result.error) throw result.error;

                // Sucesso! Redirecionar para dashboard
                window.location.href = 'dashboard.html';

            } catch (err) {
                console.error('Auth error:', err);
                errorMsg.textContent = err.message || 'Erro na autenticação';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = isLogin ? 'Entrar na Plataforma' : 'Criar Conta';
            }
        });
    </script>
</body>
</html>
