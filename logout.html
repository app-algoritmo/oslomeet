<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout - Oslo Meet</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-purple: #8b5cf6;
            --accent-blue: #3b82f6;
            --success-green: #10b981;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .logout-container {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 3rem;
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        
        .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
        }
        
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        
        p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        
        .email-display {
            background: rgba(139,92,246,0.1);
            border: 1px solid rgba(139,92,246,0.2);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        
        .email-display strong {
            color: var(--accent-purple);
            word-break: break-all;
        }
        
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .btn {
            padding: 14px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-logout {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }
        
        .btn-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(239,68,68,0.3);
        }
        
        .btn-cancel {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--text-secondary);
        }
        
        .btn-cancel:hover {
            background: rgba(255,255,255,0.05);
            color: white;
        }
        
        .success-message {
            display: none;
        }
        
        .success-message.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(139,92,246,0.2);
            border-top-color: var(--accent-purple);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <!-- Confirmação -->
        <div id="confirmSection">
            <div class="icon"></div>
            <h1>Sair da sua conta?</h1>
            <p>Você está prestes a encerrar sua sessão no Oslo Meet.</p>
            
            <div class="email-display">
                Conectado como:<br>
                <strong id="userEmail">carregando...</strong>
            </div>
            
            <div class="btn-group">
                <button class="btn btn-logout" onclick="performLogout()">
                    <i class="fas fa-sign-out-alt"></i>
                    Sim, quero sair
                </button>
                <button class="btn btn-cancel" onclick="window.history.back()">
                    <i class="fas fa-arrow-left"></i>
                    Não, voltar
                </button>
            </div>
        </div>
        
        <!-- Processando -->
        <div id="processingSection" style="display: none;">
            <div class="spinner"></div>
            <h1>Saindo...</h1>
            <p>Encerrando sua sessão com segurança.</p>
        </div>
        
        <!-- Sucesso -->
        <div id="successSection" class="success-message">
            <div class="icon" style="background: linear-gradient(135deg, var(--success-green), #059669);">
                ✓
            </div>
            <h1>Logout realizado!</h1>
            <p>Você saiu da sua conta com sucesso.</p>
            <p style="font-size: 0.9rem;">Redirecionando para a página inicial em <strong id="countdown">3</strong> segundos...</p>
        </div>
    </div>

        <!-- Supabase SDK -->
    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const SUPABASE_URL = 'https://mrparduxlvvflasgefpt.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ycGFyZHV4bHZ5Zmxhc2dlZnB0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MzE4NDUsImV4cCI6MjA5NTEwNzg0NX0.JXlq6E4t2iD_tvtlXhwVtE_oQBsgPP3QrIPi2UULji0';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Mostrar email do usuário logado
        async function showUserEmail() {
            const { data: { user } } = await supabase.auth.getUser();
            
            // Se o usuário já não estiver logado ao entrar aqui, manda para a Home
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            
            // Se estiver logado, mostra o email na tela
            document.getElementById('userEmail').textContent = user.email;
        }

        // Função de logout
        window.performLogout = async function() {
            // Mostrar seção de processamento
            document.getElementById('confirmSection').style.display = 'none';
            document.getElementById('processingSection').style.display = 'block';
            
            try {
                // Chamar logout do Supabase
                const { error } = await supabase.auth.signOut();
                
                if (error) throw error;
                
                // Mostrar sucesso
                document.getElementById('processingSection').style.display = 'none';
                document.getElementById('successSection').classList.add('active');
                
                // Countdown e redirecionamento para a HOME (Index)
                let seconds = 3;
                const counter = setInterval(() => {
                    seconds--;
                    document.getElementById('countdown').textContent = seconds;
                    
                    if (seconds <= 0) {
                        clearInterval(counter);
                        // ✅ IMPORTANTE: Redirecionar para a Home, não para Login
                        window.location.href = 'index.html';
                    }
                }, 1000);
                
            } catch (error) {
                console.error('Erro no logout:', error);
                alert('Erro ao sair: ' + error.message);
                
                // Voltar para confirmação em caso de erro
                document.getElementById('confirmSection').style.display = 'block';
                document.getElementById('processingSection').style.display = 'none';
            }
        }

        // Inicializar
        showUserEmail();
    </script>
    
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</body>
</html>
