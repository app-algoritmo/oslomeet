<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logout - Oslo Meet</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: #0f172a; 
            color: #f8fafc; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0; 
        }
        .container { 
            text-align: center; 
            padding: 3rem; 
            background: #1e293b; 
            border-radius: 20px; 
            max-width: 450px; 
        }
        .spinner { 
            width: 50px; 
            height: 50px; 
            border: 4px solid rgba(139,92,246,0.2); 
            border-top-color: #8b5cf6; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin: 0 auto 1.5rem; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn { 
            margin: 10px; 
            padding: 12px 24px; 
            border-radius: 8px; 
            border: none; 
            cursor: pointer; 
            font-weight: 600; 
            text-decoration: none; 
            display: inline-block; 
        }
        .btn-logout { background: #ef4444; color: white; }
        .btn-cancel { background: transparent; color: #94a3b8; border: 1px solid #94a3b8; }
    </style>
</head>
<body>
    <div class="container">
        <div id="content">
            <div class="spinner"></div>
            <h2>Processando logout...</h2>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        
        const supabase = createClient(
            'https://mrparduxlvvflasgefpt.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ycGFyZHV4bHZ5Zmxhc2dlZnB0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MzE4NDUsImV4cCI6MjA5NTEwNzg0NX0.JXlq6E4t2iD_tvtlXhwVtE_oQBsgPP3QrIPi2UULji0'
        );

        // Aguarda 1 segundo para garantir que a página carregou
        setTimeout(async () => {
            try {
                // Faz logout
                await supabase.auth.signOut();
                
                // Mostra mensagem de sucesso
                document.getElementById('content').innerHTML = `
                    <div style="font-size: 4rem; margin-bottom: 1rem;">✅</div>
                    <h2>Logout realizado!</h2>
                    <p style="color: #94a3b8; margin: 1rem 0;">Redirecionando...</p>
                `;
                
                // Aguarda 1.5s e vai para home
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
                
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <div style="font-size: 4rem; margin-bottom: 1rem;">⚠️</div>
                    <h2>Erro ao sair</h2>
                    <p style="color: #94a3b8;">${error.message}</p>
                    <a href="index.html" class="btn btn-cancel">Voltar para Home</a>
                `;
            }
        }, 1000);
    </script>
</body>
</html>
