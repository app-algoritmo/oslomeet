<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Oslo Meet</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --accent-purple: #8b5cf6;
            --accent-blue: #3b82f6;
            --success-green: #10b981;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .dashboard-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 0; border-bottom: 1px solid var(--border-color);
            margin-bottom: 40px; flex-wrap: wrap; gap: 15px;
        }
        .dashboard-header h1 { font-size: 1.8rem; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .btn-logout {
            padding: 8px 16px; background: transparent; border: 1px solid var(--border-color);
            color: var(--text-secondary); border-radius: 8px; cursor: pointer;
        }
        .btn-logout:hover { border-color: var(--accent-purple); color: white; }
        
        /* Stats Cards */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; margin-bottom: 40px;
        }
        .stat-card {
            background: var(--card-bg); padding: 20px; border-radius: 12px;
            border: 1px solid var(--border-color);
        }
        .stat-card h3 { font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 8px; }
        .stat-card .value { font-size: 2rem; font-weight: 700; color: var(--accent-purple); }
        
        /* Matches Section */
        .section-title { font-size: 1.5rem; margin-bottom: 20px; }
        .matches-grid {
            display: grid; grid-template-columns: 1fr; gap: 15px;
        }
        @media (min-width: 768px) { .matches-grid { grid-template-columns: repeat(2, 1fr); } }
        
        .match-card {
            background: var(--card-bg); padding: 20px; border-radius: 12px;
            border: 1px solid var(--border-color); transition: all 0.3s;
        }
        .match-card:hover { border-color: var(--accent-purple); transform: translateY(-2px); }
        .match-header {
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 12px; flex-wrap: wrap; gap: 10px;
        }
        .match-header h4 { font-size: 1.1rem; }
        .match-score {
            background: linear-gradient(135deg, var(--success-green), #059669);
            color: white; padding: 4px 12px; border-radius: 20px;
            font-size: 0.85rem; font-weight: 600;
        }
        .match-industry {
            color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 12px;
        }
        .match-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
        .tag {
            background: rgba(59,130,246,0.15); color: #93c5fd;
            padding: 4px 10px; border-radius: 16px; font-size: 0.75rem;
        }
        .btn-connect {
            width: 100%; margin-top: 15px; padding: 10px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            color: white; border: none; border-radius: 8px;
            font-weight: 600; cursor: pointer;
        }
        .btn-connect:hover { opacity: 0.9; }
        
        /* Loading State */
        .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
        .empty-state {
            text-align: center; padding: 60px 20px; color: var(--text-secondary);
        }
        .empty-state i { font-size: 3rem; margin-bottom: 20px; opacity: 0.5; }
        
        /* Footer */
        .dashboard-footer {
            margin-top: 60px; padding-top: 20px; border-top: 1px solid var(--border-color);
            text-align: center; color: var(--text-secondary); font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="dashboard-header">
            <h1>👋 Welcome to Oslo Meet</h1>
            <div class="user-info">
                <span id="userEmail">Loading...</span>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </header>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Your Company</h3>
                <div class="value" id="companyName">-</div>
            </div>
            <div class="stat-card">
                <h3>Matches Found</h3>
                <div class="value" id="matchCount">0</div>
            </div>
            <div class="stat-card">
                <h3>Top Match Score</h3>
                <div class="value" id="topScore">0%</div>
            </div>
        </div>

        <!-- Matches Section -->
        <h2 class="section-title">🎯 Recommended Matches</h2>
        <div id="matchesContainer" class="matches-grid">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Finding your best matches...</p>
            </div>
        </div>

        <div class="footer-bottom">
    <div class="footer-copyright">
        &copy; 2026 Oslo Meet
    </div>
    <div class="developer-credit">
        <a href="https://app-algoritmo.github.io/digital-solutions" target="_blank" rel="noopener">
            <i class="fas fa-code"></i> Digital Solutions
        </a>
    </div>
</div>

    <!-- SUPABASE INTEGRATION -->
    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const SUPABASE_URL = 'https://mrparduxlvyflasgefpt.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ycGFyZHV4bHZ5Zmxhc2dlZnB0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MzE4NDUsImV4cCI6MjA5NTEwNzg0NX0.JXlq6E4t2iD_tvtlXhwVtE_oQBsgPP3QrIPi2UULji0';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Load Dashboard Data
        async function loadDashboard() {
            // Em produção: pegar do usuário logado via supabase.auth.getUser()
            // Por enquanto, pegamos a primeira empresa do banco para teste
            const { data: companies, error } = await supabase
                .from('companies')
                .select('id, name, contact_email')
                .limit(1)
                .single();

            if (error || !companies) {
                document.getElementById('matchesContainer').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>No company found</h3>
                        <p>Register your company first to see matches.</p>
                        <a href="join.html" style="color: var(--accent-purple); display: inline-block; margin-top: 15px;">Go to Registration →</a>
                    </div>
                `;
                document.getElementById('userEmail').textContent = 'Not registered';
                return;
            }

            document.getElementById('companyName').textContent = companies.name;
            document.getElementById('userEmail').textContent = companies.contact_email;

            // Buscar matches usando a função SQL
            const { data: matches, error: matchesError } = await supabase
                .rpc('get_company_matches', {
                    target_company_id: companies.id,
                    match_limit: 10,
                    min_score: 0.3
                });

            if (matchesError || !matches || matches.length === 0) {
                document.getElementById('matchesContainer').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <h3>No matches yet</h3>
                        <p>As more companies join, you'll see compatible matches here.</p>
                        <p style="margin-top: 10px; font-size: 0.9rem;">Current companies in database: 1 (you)</p>
                    </div>
                `;
                document.getElementById('matchCount').textContent = '0';
                return;
            }

            // Atualizar stats
            document.getElementById('matchCount').textContent = matches.length;
            document.getElementById('topScore').textContent = Math.round(matches[0].compatibility_score * 100) + '%';

            // Renderizar matches
            const container = document.getElementById('matchesContainer');
            container.innerHTML = matches.map(match => `
                <div class="match-card">
                    <div class="match-header">
                        <h4>${match.matched_name}</h4>
                        <span class="match-score">${Math.round(match.compatibility_score * 100)}% Match</span>
                    </div>
                    <div class="match-industry">${match.matched_industry || 'Industry not specified'}</div>
                    <div class="match-tags">
                        <span class="tag"><i class="fas fa-handshake"></i> Partnership</span>
                        <span class="tag"><i class="fas fa-globe"></i> Cross-border</span>
                    </div>
                    <button class="btn-connect" onclick="alert('Messaging feature coming soon!')">
                        <i class="fas fa-envelope"></i> Connect
                    </button>
                </div>
            `).join('');
        }

        // Logout
        window.logout = () => {
            // Em produção: await supabase.auth.signOut()
            window.location.href = 'index.html';
        };

        // Initialize
        loadDashboard();
    </script>
</body>
</html>
